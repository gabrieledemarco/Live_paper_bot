; ============================================================================
; CONFIGURATION FILE - OFI HFT TRADING PIPELINE
; Centralized parametric configuration. The whole pipeline reads from here.
; ============================================================================

[DATA]
; Directory containing raw Binance Vision zip/csv files (bookTicker + trades)
input_dir = data/raw
; Output directory for partitioned parquet files
output_dir = data/parquet
; Binance Vision market: spot | um (USD-M futures) | cm (COIN-M futures)
; NOTE: bookTicker is published ONLY for futures (um/cm). For spot you would
; need to switch provider (Tardis/Kaiko) or reconstruct BBO from trades.
market = um
; Auto-download missing archives from data.binance.vision before ingestion
auto_download = true
; Comma-separated list of trading pairs to process
pairs = BTCUSDT,ETHUSDT
; Train/test split dates (ISO format YYYY-MM-DD)
train_start_date = 2024-04-01
train_end_date = 2024-04-05
test_start_date = 2024-04-06
test_end_date = 2024-04-07
; Resampling frequency for OFI aggregation (e.g., 100ms, 1s, 10tick)
resample_freq = 1s

[MODEL]
; Number of future ticks/bars used to define the label (mid-price movement)
target_ticks = 10
; Threshold (in basis points) for labeling [-1, 0, +1]
threshold_alpha = 1.5
; Model type: Ridge | LightGBM
model_type = LightGBM
; Number of time series CV splits
n_splits = 5
; Aggregation window for OFI rolling features (number of intervals)
ofi_window = 20
; Where serialized models are stored
model_dir = models_store

[BACKTEST]
; Initial capital for the simulator
initial_capital = 100000.0
; Maker/taker fees in fraction (e.g., 0.0002 = 2bps)
maker_fee = 0.0002
taker_fee = 0.0004
; Base artificial latency in milliseconds
base_latency_ms = 10
; Latency stress test grid (comma-separated milliseconds)
latency_grid = 0,10,50,100
; Adverse slippage applied to the entry price per millisecond of latency
; (basis points per ms). Drives the sub-bar latency degradation.
latency_slippage_bps_per_ms = 0.02
; Risk parameters
stop_loss_bps = 5.0
take_profit_bps = 10.0
; Max position size (in base currency units)
max_position = 1.0
; Signal threshold used to convert model probabilities into trade decisions
signal_threshold = 0.55

[REPORT]
charts_dir = reports/charts
log_dir = logs

; ============================================================================
; HIGH-TIMEFRAME (HTF) MULTI-TIMEFRAME TRACK
; Parallel, bar-level pipeline (CCXT OHLCV + multi-timeframe microstructure).
; Independent from the tick-level OFI sections above. Stages:
;   python main.py htf-download | htf-features | htf-train | htf-evaluate | htf-all
; ============================================================================

[HTF_DATA]
; CCXT exchange id used for OHLCV ingestion.
exchange = binance
; Comma-separated trading pairs (exchange-native ids, e.g. BTCUSDT).
pairs = BTCUSDT,ETHUSDT
; Timeframes to download. 60m is mapped to CCXT '1h' transparently.
timeframes = 1m,5m,15m,60m
; Base timeframe the model trains on; higher TFs are aligned onto it.
base_timeframe = 1m
; How many days of history to fetch (backward from now).
lookback_days = 180
; Parquet store root for OHLCV: <output_dir>/<PAIR>/<TF>/part.parquet
output_dir = data/ohlcv

[HTF_FEATURES]
; Rolling window (in bars) for volume stats / volatility proxies.
vol_window = 20
; Rolling window (in bars) for VWAP.
vwap_window = 20
; Enrich bars with TRUE microstructure (OFI/OBI/TSI) from the tick store
; (data/parquet/<PAIR>) where that date is available; proxies otherwise.
enrich_from_ticks = true

[HTF_MODEL]
; Prediction target: classification (direction) | regression (log-return).
task_type = classification
; Estimator: LightGBM | Ridge.
model_type = LightGBM
; Forward horizon for the label, in base-timeframe bars.
target_horizon = 5
; Flat-zone half-width in basis points (classification labelling only).
threshold_bps = 5.0
; Purged time-series CV folds.
n_splits = 5
; Bars purged (embargo) between train and test in each CV fold.
embargo = 10
; Keep only the top-K features by LightGBM gain importance (0 = keep all).
top_k_features = 0
; Time-ordered tail fraction held out as the untouched test set.
holdout_frac = 0.2
