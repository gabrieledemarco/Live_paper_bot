services:
  - type: web
    name: live-api
    runtime: docker
    dockerfilePath: live/Dockerfile.api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: live-trader-db
          property: connectionString

  - type: worker
    name: live-trader
    runtime: docker
    dockerfilePath: live/Dockerfile.trader
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: live-trader-db
          property: connectionString

databases:
  - name: live-trader-db
    databaseName: live_trader
    plan: free
